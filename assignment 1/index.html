<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Interactive Website</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
scroll-behavior:smooth;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
background:#9b8400;
color:white;
padding:15px;
}

.logo img{
height:40px;
}

.logo{
font-size:14px;
font-weight:bold;
}

.social-icons a{
color:rgb(0, 0, 0);
margin-left:15px;
font-size:20px;
text-decoration:none;
}

/* MENU */

nav{
background:#aa8b00;
}

nav ul{
margin:0;
padding:0;
display:flex;
list-style:none;
}

nav ul li{
padding:14px 20px;
}

nav ul li a{
color:rgb(255, 255, 255);
text-decoration:none;
font-weight:bold;
}

nav ul li:hover{
background:#635100;
}

/* LAYOUT */

.container{
display:flex;
}

/* SIDEBAR */

.sidebar{
width:25%;
background:#b69400;
padding:20px;
color:white;
min-height:500px;
}

/* TITLE */

.dashboard-title{
font-size:22px;
margin-bottom:20px;
display:flex;
align-items:center;
gap:10px;
}

/* DASHBOARD CARDS */

.dashboard-card{
background:#5a4d00;
padding:12px;
margin-bottom:12px;
border-radius:8px;
display:flex;
align-items:center;
gap:10px;
cursor:pointer;
transition:0.3s;
font-size:16px;
}

/* ICON */

.dashboard-card i{
font-size:18px;
}

/* HOVER EFFECT */

.dashboard-card:hover{
background:#725d22;
transform:translateX(5px);
}

/* MAIN */

.main{
width:75%;
padding:20px;
}

.news-panel{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
margin-top:20px;
}

.news-panel ul{
list-style:none;
padding:0;
}

.news-panel li{
padding:10px;
border-bottom:1px solid #eee;
}

.news-panel a{
text-decoration:none;
color:#333;
font-size:16px;
}

.news-panel a:hover{
color:#2563eb;
}
/* NEWS SECTION */

.news-title{
margin-top:20px;
font-size:20px;
color:#ffffff;
display:flex;
align-items:center;
gap:8px;
}

.news-box{
background:white;
padding:10px;
border-radius:8px;
box-shadow:0 4px 10px rgba(0,0,0,0.15);
margin-top:10px;
}

/* RSS LINKS */

.news-box ul{
padding:0;
list-style:none;
}

.news-box li{
margin-bottom:10px;
border-bottom:1px solid #eee;
padding-bottom:8px;
}

.news-box a{
text-decoration:none;
color:#333;
font-size:14px;
display:block;
transition:0.3s;
}

.news-box a:hover{
color:#0077ff;
transform:translateX(5px);
}

/* CARD BOXES */

.box-container{
display:flex;
gap:20px;
margin-top:20px;
}

.box{
background:white;
padding:15px;
border-radius:5px;
box-shadow:0 0 5px rgba(0,0,0,0.2);
width:33%;
}

.box img{
width:100%;
}

/* FOOTER */

footer{
background:#222;
color:white;
text-align:center;
padding:15px;
margin-top:20px;
}

</style>
</head>

<body>

<header>

<div class="logo">
<a href="index.html">
<img src="logo.jpg" alt="Website Logo">
</a>
</div>

<div class="social-icons">
<a href="#"><i class="fab fa-facebook"></i></a>
<a href="#"><i class="fab fa-instagram"></i></a>
<a href="#"><i class="fab fa-twitter"></i></a>
</div>

</header>

<nav>
<ul>
<li><a href="#">Home</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Services</a></li>
<li><a href="#">Contact</a></li>
</ul>
</nav>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<!-- DASHBOARD -->

<h2 class="dashboard-title">
<i class="fa-solid fa-gauge"></i> Dashboard
</h2>

<div class="dashboard-card" onclick="showContent('news')">
<i class="fa-solid fa-newspaper"></i>
<span>News</span>
</div>

<div class="dashboard-card" onclick="showContent('updates')">
<i class="fa-solid fa-bell"></i>
<span>Updates</span>
</div>

<div class="dashboard-card" onclick="showContent('resources')">
<i class="fa-solid fa-book"></i>
<span>Resources</span>
</div>

<!-- GOOGLE NEWS -->

<h3 class="news-title">
<i class="fa-solid fa-newspaper"></i> Google News
</h3>

<div class="news-box">

<script src="https://rss.bloople.net/?url=https%3A%2F%2Fnews.google.com%2Frss%3Fhl%3Den-IN%26gl%3DIN%26ceid%3DIN%3Aen&limit=5&type=js"></script>

</div>

</div>
<!-- MAIN -->

<div class="main">

<!-- NEWS -->

<div id="news" class="content-box active">

<h2>
<i class="fa-solid fa-newspaper"></i> Google News
</h2>

<div class="news-panel">

<script src="https://rss.bloople.net/?url=https%3A%2F%2Fnews.google.com%2Frss%3Fhl%3Den-IN%26gl%3DIN%26ceid%3DIN%3Aen&limit=10&type=js"></script>

</div>

</div>

<!-- UPDATES -->

<div id="updates" class="content-box">

<h2>Updates</h2>

<p>Website updates and announcements will appear here.</p>

</div>

<!-- RESOURCES -->

<div id="resources" class="content-box">

<h2>Resources</h2>

<p>Useful links and learning materials will appear here.</p>

</div>

</div>

</div>

<footer>

<p>© 2026 My Website | by Safin Maibam</p>

</footer>

<script>

function showContent(section){

let boxes = document.querySelectorAll(".content-box");

boxes.forEach(box=>{
box.classList.remove("active");
});

document.getElementById(section).classList.add("active");

}

</script>

</body>
</html>
